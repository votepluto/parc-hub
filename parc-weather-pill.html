<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARC Weather Pill</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.22);
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    border-radius: 999px;
    padding: 9px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
  }

  .pill:hover {
    background: rgba(255, 255, 255, 0.28);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .divider {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.3);
    border-radius: 1px;
  }

  .pill-item { display: flex; align-items: center; gap: 6px; }

  .pill-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.65;
  }

  .pill-value { font-size: 14px; font-weight: 700; }

  .pill-loading {
    opacity: 0.5;
    font-size: 13px;
    letter-spacing: 0.05em;
    font-family: 'Nunito', sans-serif;
    color: rgba(255,255,255,0.8);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  .pill { animation: fadeIn 0.5s ease both; }
</style>
</head>
<body>

<div class="pill" id="pill">
  <span class="pill-loading">fetching weather…</span>
</div>

<script>
  function weatherLabel(code) {
    if (code === 0)  return 'Clear';
    if (code <= 2)   return 'Mostly clear';
    if (code === 3)  return 'Overcast';
    if (code <= 48)  return 'Foggy';
    if (code <= 55)  return 'Drizzle';
    if (code <= 65)  return 'Rainy';
    if (code <= 77)  return 'Snowy';
    if (code <= 82)  return 'Showers';
    return 'Stormy';
  }

  async function loadWeather() {
    const lat = -37.8136, lon = 144.9631;
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,weather_code,is_day`
      + `&daily=uv_index_max`
      + `&timezone=Australia%2FMelbourne&forecast_days=1`;

    try {
      const res  = await fetch(url);
      const data = await res.json();
      const c    = data.current;
      const uv   = data.daily?.uv_index_max?.[0] ?? '—';

      const label  = weatherLabel(c.weather_code);
      const temp   = Math.round(c.temperature_2m);
      const uvNum  = parseFloat(uv);

      let uvLabel = '—';
      if (!isNaN(uvNum)) {
        if (uvNum <= 2)       uvLabel = 'Low';
        else if (uvNum <= 5)  uvLabel = 'Moderate';
        else if (uvNum <= 7)  uvLabel = 'High';
        else if (uvNum <= 10) uvLabel = 'Very high';
        else                  uvLabel = 'Extreme';
      }

      document.getElementById('pill').innerHTML = `
        <span class="pill-value">${temp}°C</span>
        <div class="divider"></div>
        <span class="pill-value">${label}</span>
        <div class="divider"></div>
        <span class="pill-item">
          <span class="pill-label">UV</span>
          <span class="pill-value">${isNaN(uvNum) ? '—' : Math.round(uvNum)} · ${uvLabel}</span>
        </span>
      `;
    } catch (e) {
      document.getElementById('pill').innerHTML = `
        <span class="pill-value">Weather unavailable</span>
      `;
    }
  }

  loadWeather();
  setInterval(loadWeather, 30 * 60 * 1000);
</script>

</body>
</html>
