<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARC News</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #ffffff;
    --bg-inner:  #ffffff;
    --text:      #2A1D2E;
    --accent:    #7A5C82;
    --accent-lt: #B89EB8;
    --tag-bg:    rgba(122, 92, 130, 0.12);
    --border:    rgba(122, 92, 130, 0.15);
    --muted:     rgba(42, 29, 46, 0.45);
    --subtle:    rgba(42, 29, 46, 0.25);
  }

  html, body {
    background: var(--bg);
    font-family: 'Nunito', -apple-system, sans-serif;
    font-size: 14px;
    color: var(--text);
  }

  .widget { 
    background: var(--bg-inner); 
    border-radius: 12px; 
    width: 100%; 
    min-height: 100vh; 
    box-shadow: 0 1px 3px rgba(122, 92, 130, 0.08);
    overflow: hidden;
  }

  /* ── HEADER ── */
  .widget-header {
    padding: 24px 24px 20px;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(122, 92, 130, 0.02) 0%, rgba(122, 92, 130, 0.05) 100%);
  }
  .widget-title { 
    font-size: 16px; 
    font-weight: 700; 
    color: var(--text); 
    letter-spacing: -0.02em; 
    display: flex; 
    align-items: center; 
    text-transform: lowercase;
  }

  /* ── TABS ── */
  .tab-bar {
    display: flex; 
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(122, 92, 130, 0.025);
    gap: 2px;
  }
  .tab {
    padding: 16px 20px 14px;
    font-size: 13px; 
    font-weight: 600; 
    color: var(--muted);
    cursor: pointer; 
    border-bottom: 3px solid transparent;
    margin-bottom: -1px; 
    transition: all 0.2s ease;
    user-select: none; 
    display: flex; 
    align-items: center; 
    gap: 8px;
    border-radius: 8px 8px 0 0;
    position: relative;
    overflow: hidden;
  }
  .tab::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(122, 92, 130, 0.05) 0%, rgba(122, 92, 130, 0.02) 100%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .tab:hover::before { opacity: 1; }
  .tab:hover { 
    color: var(--accent); 
    background: rgba(122, 92, 130, 0.04);
  }
  .tab.active { 
    color: var(--accent); 
    border-bottom-color: var(--accent); 
    background: white;
    box-shadow: 0 -2px 8px rgba(122, 92, 130, 0.08);
  }
  .tab.active::before { opacity: 0; }

  .tab-badge {
    font-size: 10px; 
    font-weight: 700;
    background: var(--tag-bg); 
    color: var(--accent);
    border-radius: 12px; 
    padding: 2px 7px;
    transition: all 0.2s ease;
    opacity: 0;
    min-width: 18px;
    text-align: center;
  }
  .tab-badge.visible { opacity: 1; }
  .tab.active .tab-badge { 
    background: var(--accent); 
    color: white; 
    box-shadow: 0 1px 3px rgba(122, 92, 130, 0.3);
  }

  /* ── CONTENT ── */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── TYPEWRITER ── */
  .typewriter-wrap {
    padding: 24px 20px;
    display: flex; align-items: center; gap: 2px;
  }
  .typewriter-text {
    font-size: 12px; font-weight: 500; color: var(--muted);
    overflow: hidden; white-space: nowrap;
    width: 0; animation: typing 1.6s steps(22, end) forwards;
  }
  .typewriter-cursor {
    width: 1.5px; height: 13px; background: var(--accent-lt);
    animation: blink 0.7s step-end infinite;
    flex-shrink: 0; margin-top: 1px;
  }
  @keyframes typing { from { width: 0; } to { width: 160px; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── FEED ── */
  .feed-wrap { padding: 8px 24px 12px; }

  .feed-item {
    display: flex; 
    align-items: flex-start; 
    justify-content: space-between;
    gap: 16px; 
    padding: 18px 20px; 
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    opacity: 0; 
    transform: translateY(6px);
    animation: fadeUp 0.4s ease forwards;
    border-radius: 8px;
    margin-bottom: 2px;
    transition: all 0.2s ease;
  }
  .feed-item:last-child { border-bottom: none; margin-bottom: 0; }
  .feed-item:hover { 
    background: rgba(122, 92, 130, 0.03);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(122, 92, 130, 0.08);
  }
  .feed-item-body { flex: 1; min-width: 0; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .feed-meta { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    margin-bottom: 8px; 
  }

  /* PIP WITH TOOLTIP */
  .pip-wrap { position: relative; display: flex; align-items: center; flex-shrink: 0; }
  .feed-source-pip {
    width: 6px; height: 6px; border-radius: 50%; cursor: default;
    transition: all 0.2s ease;
    box-shadow: 0 0 0 2px rgba(122, 92, 130, 0.1);
  }
  .pip-wrap:hover .feed-source-pip { 
    transform: scale(1.4); 
    box-shadow: 0 0 0 3px rgba(122, 92, 130, 0.15);
  }
  .pip-wrap:hover .pip-tooltip { opacity: 1; }
  .pip-tooltip {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    background: var(--text); color: var(--bg);
    font-size: 11px; font-weight: 500;
    padding: 6px 10px; border-radius: 6px;
    white-space: nowrap; opacity: 0;
    transition: opacity 0.2s ease; pointer-events: none;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(42, 29, 46, 0.15);
  }
  .pip-tooltip::before {
    content: '';
    position: absolute; left: -4px; top: 50%; transform: translateY(-50%);
    border: 4px solid transparent;
    border-right-color: var(--text); border-left: none;
  }

  .feed-source-name {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .feed-sep { font-size: 11px; color: var(--subtle); margin: 0 2px; }
  .feed-date { font-size: 11px; color: var(--muted); font-weight: 500; }

  .feed-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    line-height: 1.45; transition: color 0.15s;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 2px;
  }
  .feed-item:hover .feed-title { color: var(--accent); }

  .feed-read-hint {
    font-size: 11px; font-weight: 700; color: var(--accent-lt);
    flex-shrink: 0; align-self: center;
    opacity: 0; transform: translateX(-6px);
    transition: all 0.2s ease; white-space: nowrap;
    background: rgba(122, 92, 130, 0.08);
    padding: 4px 8px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .feed-item:hover .feed-read-hint { 
    opacity: 1; 
    transform: translateX(0); 
    color: var(--accent);
    background: rgba(122, 92, 130, 0.12);
  }

  /* ── EMPTY ── */
  .empty { 
    padding: 40px 24px; 
    font-size: 13px; 
    color: var(--muted); 
    text-align: center;
    font-style: italic;
  }

  /* ── FOOTER ── */
  .widget-footer {
    padding: 16px 24px 20px; 
    border-top: 1px solid var(--border);
    display: flex; 
    align-items: center; 
    justify-content: center;
    background: rgba(122, 92, 130, 0.02);
  }
  .refresh-btn {
    font-size: 12px; 
    font-weight: 600; 
    color: var(--muted);
    cursor: pointer; 
    background: none; 
    border: 1px solid var(--border);
    font-family: inherit; 
    transition: all 0.2s ease; 
    padding: 8px 16px;
    display: flex; 
    align-items: center; 
    gap: 6px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .refresh-btn:hover { 
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(122, 92, 130, 0.05);
    transform: translateY(-1px);
  }
  .refresh-icon { 
    display: inline-block; 
    transition: transform 0.4s ease;
    font-size: 14px;
  }
  .refresh-btn.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
  .refresh-btn.done { 
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(122, 92, 130, 0.08);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="widget">

  <div class="widget-header">
    <div class="widget-title">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right:10px;flex-shrink:0;">
        <rect x="1" y="2" width="10" height="12" rx="1.5" stroke="#7A5C82" stroke-width="1.3" fill="none"/>
        <rect x="11" y="4" width="4" height="10" rx="1.5" stroke="#7A5C82" stroke-width="1.3" fill="none"/>
        <line x1="3" y1="5" x2="9" y2="5" stroke="#7A5C82" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="3" y1="7.5" x2="9" y2="7.5" stroke="#7A5C82" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="7" y2="10" stroke="#7A5C82" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="13" cy="6.5" r="1" fill="#B89EB8"/>
      </svg>news & updates
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab(0)">mental health <span class="tab-badge" id="badge-0"></span></div>
    <div class="tab" onclick="switchTab(1)">health policy <span class="tab-badge" id="badge-1"></span></div>
    <div class="tab" onclick="switchTab(2)">good things <span class="tab-badge" id="badge-2"></span></div>
  </div>

  <div class="tab-content active" id="tab-0"><div id="content-0"></div></div>
  <div class="tab-content" id="tab-1"><div id="content-1"></div></div>
  <div class="tab-content" id="tab-2"><div id="content-2"></div></div>

  <div class="widget-footer">
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <span class="refresh-icon">↻</span>
      <span id="refresh-label">refresh</span>
    </button>
  </div>

</div>
<script>
  var RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

  var SOURCE_META = {
    'The Conversation': 'Evidence-based academic analysis',
    'Mental Health AU': 'National peak body for mental health',
    'MHFA Australia':   'Mental health first aid & practical resources',
    'PsyPost':          'Latest psychology & neuroscience research',
    'ScienceDaily':     'Mind & brain science news',
    'APS':              'Australian Psychological Society',
    'Psychreg':         'Broad psychology topics & wellbeing',
    'Dept of Health':   'Australian Government health news',
    'Croakey Health':   'Independent health policy journalism',
    'Positive News':    'Solutions-focused good news stories',
    'Good News Network':'Uplifting news from around the world',
  };

  var SOURCES = {
    mentalHealth: [
      { name: 'The Conversation', url: 'https://theconversation.com/au/topics/mental-health-620/articles.atom', color: '#7A5C82' },
      { name: 'Mental Health AU', url: 'https://mhaustralia.org/taxonomy/term/1/feed',                          color: '#6B4C73' },
      { name: 'MHFA Australia',   url: 'https://mhfa.com.au/feed',                                              color: '#5C3D64' },
      { name: 'PsyPost',          url: 'https://www.psypost.org/feed',                                          color: '#B89EB8' },
      { name: 'ScienceDaily',     url: 'https://www.sciencedaily.com/rss/mind_brain.xml',                       color: '#8A7AAA' },
      { name: 'APS',              url: 'https://www.psychologicalscience.org/feed',                              color: '#9B7BAB' },
      { name: 'Psychreg',         url: 'https://www.psychreg.org/feed',                                         color: '#A68BB5' },
    ],
    healthPolicy: [
      { name: 'The Conversation', url: 'https://theconversation.com/au/topics/health-policy-2485/articles.atom', color: '#7A5C82' },
      { name: 'Dept of Health',   url: 'https://www.health.gov.au/news/rss.xml',                                  color: '#6B4C73' },
      { name: 'Croakey Health',   url: 'https://www.croakey.org/feed/',                                           color: '#B89EB8' },
    ],
    goodThings: [
      { name: 'Positive News',      url: 'https://www.positive.news/feed/',              color: '#8A7AAA' },
      { name: 'Good News Network',  url: 'https://www.goodnewsnetwork.org/feed/',         color: '#9B7BAB' },
    ]
  };

  var mhItems = [], hpItems = [], gtItems = [];
  var loadedAt = null;

  function typewriter() {
    return '<div class="typewriter-wrap">' +
      '<div class="typewriter-text">fetching the latest...</div>' +
      '<div class="typewriter-cursor"></div>' +
      '</div>';
  }

  function fetchFeed(source) {
    return fetch(RSS2JSON + encodeURIComponent(source.url))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.items || !data.items.length) return [];
        return data.items.slice(0, 5).map(function(item) {
          return {
            title:  item.title,
            link:   item.link,
            date:   item.pubDate ? new Date(item.pubDate) : null,
            source: source.name,
            color:  source.color
          };
        });
      })
      .catch(function() { return []; });
  }

  function timeAgo(date) {
    if (!date) return '';
    var diff = Math.floor((Date.now() - date.getTime()) / 1000);
    if (diff < 3600)   return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400)  return Math.floor(diff / 3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
    return date.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  }

  function setBadge(id, count) {
    var el = document.getElementById(id);
    el.textContent = count;
    if (count > 0) el.classList.add('visible');
  }

  function renderItems(items, contentId) {
    var el = document.getElementById(contentId);
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="empty">nothing to show right now — try refreshing ☁️</div>';
      return;
    }
    items.sort(function(a, b) {
      if (!a.date) return 1; if (!b.date) return -1; return b.date - a.date;
    });
    var slice = items.slice(0, 6);
    el.innerHTML = '<div class="feed-wrap">' +
      slice.map(function(item, i) {
        var meta = SOURCE_META[item.source] || item.source;
        return '<a class="feed-item" href="' + item.link + '" target="_blank" style="animation-delay:' + (i * 0.06) + 's">' +
          '<div class="feed-item-body">' +
            '<div class="feed-meta">' +
              '<div class="pip-wrap">' +
                '<div class="feed-source-pip" style="background:' + item.color + '"></div>' +
                '<div class="pip-tooltip">' + item.source + ' · ' + meta + '</div>' +
              '</div>' +
              '<span class="feed-source-name">' + item.source + '</span>' +
              (item.date ? '<span class="feed-sep">·</span><span class="feed-date">' + timeAgo(item.date) + '</span>' : '') +
            '</div>' +
            '<div class="feed-title">' + item.title + '</div>' +
          '</div>' +
          '<div class="feed-read-hint">→ read</div>' +
          '</a>';
      }).join('') +
      '</div>';
    return slice.length;
  }

  function setRefreshDone() {
    var btn = document.getElementById('refresh-btn');
    var label = document.getElementById('refresh-label');
    btn.classList.remove('spinning');
    btn.classList.add('done');
    label.textContent = '✓ up to date';
    setTimeout(function() {
      btn.classList.remove('done');
      label.textContent = 'refresh';
    }, 2000);
  }

  function loadAll() {
    var btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    btn.classList.remove('done');
    document.getElementById('refresh-label').textContent = 'refresh';

    ['content-0','content-1','content-2'].forEach(function(id) {
      document.getElementById(id).innerHTML = typewriter();
    });
    ['badge-0','badge-1','badge-2'].forEach(function(id) {
      var el = document.getElementById(id);
      el.textContent = ''; el.classList.remove('visible');
    });

    mhItems = []; hpItems = []; gtItems = [];
    loadedAt = new Date();

    var mhDone = false, hpDone = false, gtDone = false;
    function checkDone() {
      if (mhDone && hpDone && gtDone) setRefreshDone();
    }

    Promise.all(SOURCES.mentalHealth.map(fetchFeed)).then(function(results) {
      results.forEach(function(i) { mhItems = mhItems.concat(i); });
      renderItems(mhItems, 'content-0');
      setBadge('badge-0', mhItems.slice(0,6).length);
      mhDone = true; checkDone();
    });

    Promise.all(SOURCES.healthPolicy.map(fetchFeed)).then(function(results) {
      results.forEach(function(i) { hpItems = hpItems.concat(i); });
      renderItems(hpItems, 'content-1');
      setBadge('badge-1', hpItems.slice(0,6).length);
      hpDone = true; checkDone();
    });

    Promise.all(SOURCES.goodThings.map(fetchFeed)).then(function(results) {
      results.forEach(function(i) { gtItems = gtItems.concat(i); });
      renderItems(gtItems, 'content-2');
      setBadge('badge-2', gtItems.slice(0,6).length);
      gtDone = true; checkDone();
    });
  }

  function switchTab(idx) {
    document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', i === idx); });
    document.querySelectorAll('.tab-content').forEach(function(c, i) { c.classList.toggle('active', i === idx); });
  }

  loadAll();
</script>
</body>
</html>
