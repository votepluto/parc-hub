<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Check</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; font-family: 'Nunito', sans-serif; }

  .wrap { display: inline-block; position: relative; }

  .pill {
    display: inline-flex; align-items: center; gap: 0;
    background: transparent; border-radius: 4px; padding: 9px 12px;
    cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    user-select: none; white-space: nowrap; overflow: hidden;
  }
  .pill:hover { background: #EDF0F5; gap: 8px; padding: 9px 16px; }
  .pill.voted { gap: 8px; padding: 9px 16px; animation: pill-pulse 0.8s ease forwards; }

  .pill-heart { font-size: 16px; flex-shrink: 0; transition: transform 0.2s; line-height: 1; }
  .pill:hover .pill-heart { transform: scale(1.2); }
  .pill.voted .pill-heart { animation: heartbeat 0.8s cubic-bezier(0.4,0,0.2,1) forwards; }

  .pill-text {
    font-size: 13px; font-weight: 600; color: #2C3A52;
    max-width: 0; opacity: 0; overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1); white-space: nowrap;
  }
  .pill:hover .pill-text { max-width: 160px; opacity: 1; }
  .pill.voted .pill-text { max-width: 200px; opacity: 1; }

  .pill-tally {
    font-size: 11px; font-weight: 700; color: #4A5A7A;
    background: #D8E2EF; border-radius: 20px; padding: 1px 8px;
    max-width: 0; opacity: 0; overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1); white-space: nowrap; display: block;
  }
  .pill.voted .pill-tally { max-width: 80px; opacity: 1; }

  @keyframes heartbeat {
    0%   { transform: scale(1); }
    25%  { transform: scale(2.4); }
    50%  { transform: scale(1.8); }
    75%  { transform: scale(2.1); }
    100% { transform: scale(1); }
  }
  @keyframes pill-pulse {
    0%   { background: transparent; }
    30%  { background: #C8D8EF; }
    100% { background: #EDF0F5; }
  }

  .panel {
    position: absolute; top: calc(100% + 6px); left: 0;
    background: #ffffff; border: 1px solid #EDEBE9; border-radius: 4px;
    padding: 16px; width: 360px;
    box-shadow: 0 4px 20px rgba(44,58,82,0.10);
    opacity: 0; transform: translateY(-6px); pointer-events: none;
    transition: all 0.2s cubic-bezier(0.4,0,0.2,1); z-index: 100;
  }
  .panel.open { opacity: 1; transform: translateY(0); pointer-events: all; }

  .panel-prompt { font-size: 13px; font-weight: 700; color: #2C3A52; margin-bottom: 12px; }

  .options { display: flex; gap: 6px; }
  .option {
    flex: 1; background: #EDF0F5; border: 1.5px solid transparent;
    border-radius: 4px; padding: 10px 6px 8px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .option:hover { background: #E0E6EF; border-color: #C0CCDC; transform: translateY(-2px); }
  .option-symbol { font-size: 18px; line-height: 1; }
  .option-label  { font-size: 10px; font-weight: 700; color: #2C3A52; text-align: center; line-height: 1.3; }

  .care { display: none; animation: pop 0.35s ease both; }
  .care-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .care-sym  { font-size: 26px; flex-shrink: 0; }
  .care-text { font-size: 13px; font-weight: 700; color: #2C3A52; line-height: 1.4; }
  .care-links { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .ty-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: #EDF0F5; border: 1px solid #C0CCDC; border-radius: 4px;
    padding: 8px 12px; font-size: 12px; font-weight: 700; color: #4A5A7A;
    text-decoration: none; transition: all 0.15s;
  }
  .ty-link:hover { background: #E0E6EF; transform: translateY(-1px); }
  .ty-arrow { font-size: 11px; opacity: 0.6; }

  .results { display: none; animation: pop 0.35s ease both; }
  .results-label { font-size: 11px; font-weight: 600; color: #A19F9D; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .result-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .result-row:last-child { margin-bottom: 0; }
  .r-sym   { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
  .r-name  { font-size: 11px; font-weight: 600; color: #2C3A52; width: 90px; flex-shrink: 0; }
  .r-bar-wrap { flex: 1; background: #EDF0F5; border-radius: 2px; height: 6px; overflow: hidden; }
  .r-bar   { height: 100%; background: #4A5A7A; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .r-count { font-size: 11px; font-weight: 700; color: #4A5A7A; width: 16px; text-align: right; flex-shrink: 0; }

  .bottom-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px; margin-top: 10px; border-top: 1px solid #EDEBE9;
  }
  .action-link { font-size: 11px; color: #A19F9D; cursor: pointer; font-weight: 600; }
  .action-link:hover { color: #4A5A7A; }

  .loading { font-size: 11px; color: #A19F9D; font-weight: 600; text-align: center; padding: 4px 0; }

  @keyframes pop {
    0%   { transform: scale(0.92); opacity: 0; }
    70%  { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <div class="pill" id="pill" onclick="togglePanel()">
    <span class="pill-heart">💙</span>
    <span class="pill-text" id="pill-text">today's vibe?</span>
    <span class="pill-tally" id="pill-tally"></span>
  </div>

  <div class="panel" id="panel">

    <div id="vote-view">
      <div class="panel-prompt">today's vibe?</div>
      <div class="options">
        <div class="option" onclick="vote(0)"><div class="option-symbol">✨</div><div class="option-label">thriving</div></div>
        <div class="option" onclick="vote(1)"><div class="option-symbol">🫶</div><div class="option-label">all good</div></div>
        <div class="option" onclick="vote(2)"><div class="option-symbol">🧸</div><div class="option-label">need a hug tbh</div></div>
        <div class="option" onclick="vote(3)"><div class="option-symbol">👁️</div><div class="option-label">survining</div></div>
        <div class="option" onclick="vote(4)"><div class="option-symbol">🌀</div><div class="option-label">send help</div></div>
      </div>
    </div>

    <div class="care" id="care">
      <div class="care-top">
        <div class="care-sym" id="care-sym"></div>
        <div class="care-text" id="care-text"></div>
      </div>
      <div class="care-links" id="care-links"></div>
      <div class="bottom-bar">
        <div class="action-link" onclick="changeAnswer()">← change my answer</div>
        <div class="action-link" onclick="showResults()">see how the team's feeling →</div>
      </div>
    </div>

    <div class="results" id="results">
      <div class="results-label">team pulse today</div>
      <div id="results-rows"></div>
      <div class="bottom-bar">
        <div class="action-link" onclick="changeAnswer()">← change my answer</div>
        <span id="total-count" style="font-size:11px;color:#A19F9D;font-weight:600;"></span>
      </div>
    </div>

  </div>
</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqT2by-6A6AwRgNKp-crQj8o0OXJKyosCJgP_9IlIViVpchvbNbI8Cr6w2jPqx0HVupg/exec';

  var OPTIONS = [
    { key: 'thriving',  symbol: '✨', label: 'thriving',       msg: 'we love this for you 🌟',              links: [] },
    { key: 'allgood',   symbol: '🫶', label: 'all good',        msg: 'solid. keep going ♡',                  links: [] },
    { key: 'hug',       symbol: '🧸', label: 'need a hug tbh',  msg: 'you deserve a little break 🧸',        links: [{ url: 'https://youtu.be/hkBhJxZupeE?si=9RqJiCh11b0RmW9J', text: 'enjoy 7 mins of the cutest baby animals 🐾' }] },
    { key: 'survining', symbol: '👁️', label: 'survining',       msg: "honestly same. but you're doing it 👁️", links: [{ url: 'https://cat-bounce.com/', text: 'have some bouncing cats to keep survining 🐱' }] },
    { key: 'sendhelp',  symbol: '🌀', label: 'send help',       msg: 'valid. pick a link 👇',                links: [{ url: 'https://screamintothevoid.com/', text: 'scream into the void 🌀' }, { url: 'https://theuselessweb.com/', text: 'take me somewhere useless 🌐' }] }
  ];

  var myVote = null;
  var panelOpen = false;
  var liveTally = { thriving: 0, allgood: 0, hug: 0, survining: 0, sendhelp: 0 };

  // load today's tally on page load
  fetch(SCRIPT_URL + '?action=tally')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      liveTally = data;
      updatePillCount();
    })
    .catch(function() {});

  function updatePillCount() {
    var total = Object.values(liveTally).reduce(function(a,b){ return a+b; }, 0);
    if (myVote !== null && total > 0) {
      document.getElementById('pill-text').textContent = total + ' checked in today';
    }
  }

  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('panel').classList.toggle('open', panelOpen);
  }

  document.addEventListener('click', function(e) {
    if (!document.getElementById('wrap').contains(e.target)) {
      panelOpen = false;
      document.getElementById('panel').classList.remove('open');
    }
  });

  function vote(idx) {
    var opt = OPTIONS[idx];
    myVote = idx;

    // send to google sheets
    fetch(SCRIPT_URL + '?action=vote&option=' + opt.key)
      .then(function(r) { return r.json(); })
      .then(function() {
        // refresh tally after voting
        return fetch(SCRIPT_URL + '?action=tally');
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        liveTally = data;
        updatePillCount();
      })
      .catch(function() {});

    // optimistically update local tally too
    liveTally[opt.key]++;

    var total = Object.values(liveTally).reduce(function(a,b){ return a+b; }, 0);
    var pill = document.getElementById('pill');
    pill.classList.add('voted');
    document.getElementById('pill-text').textContent = total + ' checked in today';
    document.getElementById('pill-tally').textContent = opt.symbol;

    document.getElementById('care-sym').textContent = opt.symbol;
    document.getElementById('care-text').textContent = opt.msg;
    document.getElementById('care-links').innerHTML = opt.links.map(function(l) {
      return '<a class="ty-link" href="' + l.url + '" target="_blank">' + l.text + '<span class="ty-arrow">↗</span></a>';
    }).join('');

    document.getElementById('vote-view').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('care').style.display = 'block';
  }

  function changeAnswer() {
    if (myVote !== null) {
      liveTally[OPTIONS[myVote].key] = Math.max(0, liveTally[OPTIONS[myVote].key] - 1);
    }
    myVote = null;

    var pill = document.getElementById('pill');
    pill.classList.remove('voted');
    document.getElementById('pill-text').textContent = "today's vibe?";
    document.getElementById('pill-tally').textContent = '';

    document.getElementById('care').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('vote-view').style.display = 'block';
  }

  function showResults() {
    // fetch fresh tally before showing
    fetch(SCRIPT_URL + '?action=tally')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        liveTally = data;
        renderResults();
      })
      .catch(function() {
        renderResults();
      });
  }

  function renderResults() {
    var total = Object.values(liveTally).reduce(function(a,b){ return a+b; }, 0);
    var max = Math.max.apply(null, Object.values(liveTally));
    var myOpt = OPTIONS[myVote];

    document.getElementById('total-count').textContent = total + ' responses';
    document.getElementById('results-rows').innerHTML = OPTIONS.map(function(o) {
      var count = liveTally[o.key] || 0;
      var pct = max > 0 ? Math.round((count / max) * 100) : 0;
      var isMine = o.key === myOpt.key;
      return '<div class="result-row">' +
        '<div class="r-sym">' + o.symbol + '</div>' +
        '<div class="r-name" style="' + (isMine ? 'color:#4A5A7A;font-weight:700;' : '') + '">' + o.label + (isMine ? ' ←' : '') + '</div>' +
        '<div class="r-bar-wrap"><div class="r-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="r-count">' + count + '</div>' +
        '</div>';
    }).join('');

    document.getElementById('care').style.display = 'none';
    document.getElementById('results').style.display = 'block';
  }
</script>
</body>
</html>
